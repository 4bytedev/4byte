name: PR Review

on:
  workflow_run:
    workflows: ["Lint", "Security", "Test"]  # workflow display name
    types:
      - completed

permissions:
  contents: read
  pull-requests: write
  checks: read
  statuses: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Get workflow runs status
        uses: actions/github-script@v7
        with:
          script: |
            const { context, github, core } = require('@actions/github-script');
            const prNumber = context.payload.workflow_run.pull_requests[0].number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // PR'ın HEAD SHA'sı
            const sha = context.payload.workflow_run.head_sha;

            // Tüm workflow run’larını al
            const { data: runs } = await github.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              per_page: 50
            });

            // PR SHA ile eşleşen workflow’ları filtrele
            const relevantRuns = runs.workflow_runs.filter(r =>
              r.head_sha === sha &&
              ["Lint", "Security", "Test"].includes(r.name) &&
              r.status === "completed"
            );

            // Eğer hepsi completed değilse exit
            if (relevantRuns.length < 3) {
              console.log("Henüz tüm workflow’lar tamamlanmadı. Bekle.");
              core.setOutput("conclusion", "pending");
              return;
            }

            const allSuccess = relevantRuns.every(r => r.conclusion === "success");
            core.setOutput("conclusion", allSuccess ? "success" : "failure");
            core.setOutput("pr_number", prNumber);

      - name: Approve or request changes
        if: steps.review.outputs.conclusion != 'pending'
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const prNumber = parseInt("${{ steps.review.outputs.pr_number }}");
            const conclusion = "${{ steps.review.outputs.conclusion }}";

            if (conclusion === "success") {
              await github.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                body: "✅ All workflows passed. PR approved.",
                event: "APPROVE"
              });
            } else {
              await github.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                body: "❌ One or more workflows failed. Please fix before merge.",
                event: "REQUEST_CHANGES"
              });
            }
